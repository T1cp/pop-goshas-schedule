<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epic OS V4.1 - Fixed & Ultra</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary: #6366f1; --primary-light: #818cf8; --primary-dark: #4f46e5;
            --bg-color: #f8fafc; --card-bg: #ffffff; --text-main: #0f172a;
            --text-muted: #64748b; --border-color: #e2e8f0; --danger: #ef4444;
            --success: #22c55e; --warning: #f59e0b; --xp-color: #d946ef;
            --glass-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }
        body.dark-mode {
            --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc;
            --text-muted: #94a3b8; --border-color: #334155;
            --primary: #818cf8; --primary-light: #6366f1;
            --glass-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; transition: 0.3s; padding-bottom: 80px; }

        /* --- Header & Layout (V3 Style) --- */
        header { 
            background: var(--card-bg); padding: 15px 30px; box-shadow: var(--glass-shadow); 
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border-color); flex-wrap: wrap; gap: 10px;
        }
        .nav-tabs { display: flex; gap: 8px; }
        .tab-btn { padding: 10px 18px; border: none; background: transparent; font-size: 15px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn:hover { background: var(--bg-color); color: var(--primary); }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }

        .container { padding: 30px; max-width: 1600px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease forwards; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); border-radius: 16px; box-shadow: var(--glass-shadow); padding: 24px; margin-bottom: 24px; border: 1px solid var(--border-color); transition: 0.3s; }
        .card-header { background: transparent; color: var(--text-main); padding-bottom: 15px; margin-bottom: 20px; font-weight: 700; font-size: 18px; border-bottom: 2px solid var(--bg-color); display: flex; justify-content: space-between; align-items: center; }

        /* --- PFP & Controls --- */
        .profile-switcher { display: flex; align-items: center; gap: 10px; background: var(--bg-color); padding: 6px; border-radius: 40px; border: 1px solid var(--border-color); }
        .pfp-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; object-fit: cover; transition: 0.2s; }
        .pfp-btn:hover { transform: scale(1.1); }
        .pfp-btn.active { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }

        .controls { display: flex; align-items: center; gap: 12px; }
        .icon-btn { padding: 8px; border-radius: 50%; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
        
        .clock-widget {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
            color: white; padding: 6px 12px; border-radius: 10px; font-weight: 700;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4); min-width: 140px; text-align: center;
        }
        .clock-time { font-size: 16px; } .clock-date { font-size: 10px; opacity: 0.9; text-transform: uppercase; }

        /* --- Gamification --- */
        .level-badge { display: flex; align-items: center; gap: 10px; background: var(--bg-color); padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border-color); }
        .xp-bar-container { width: 80px; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--xp-color), #f472b6); width: 0%; transition: width 0.5s ease-out; }

        /* --- Inputs & Tables --- */
        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--border-color); border-radius: 6px; cursor: pointer; position: relative; transition: 0.2s; background: var(--card-bg); }
        input[type="checkbox"]:checked { background-color: var(--success); border-color: var(--success); }
        input[type="checkbox"]:checked::after { content: '\f00c'; font-family: 'FontAwesome'; color: white; font-size: 12px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        input[type="checkbox"].missed { border-color: var(--danger); background-color: rgba(239, 68, 68, 0.15); }
        .missed-text { color: var(--danger) !important; font-weight: 600; }

        .btn-add { width: 100%; padding: 10px; background: var(--bg-color); border: 1px dashed var(--border-color); border-radius: 8px; cursor: pointer; color: var(--text-muted); margin-top: 15px; font-weight: 600; transition: 0.2s; }
        .btn-add:hover { border-color: var(--primary); color: var(--primary); background: rgba(99, 102, 241, 0.05); }

        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th, .data-table td { padding: 14px 12px; border-bottom: 1px solid var(--border-color); text-align: left; }
        .data-table th { background: var(--bg-color); color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 12px; }
        .editable { padding: 4px; border-radius: 4px; border: 1px solid transparent; min-width: 30px; display: inline-block; transition: 0.2s; }
        .editable:hover, .editable:focus { border-color: var(--primary); background: var(--bg-color); outline: none; }

        .weekly-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px; }
        .day-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .day-header { background: var(--bg-color); color: var(--text-main); text-align: center; padding: 12px; font-weight: 700; border-bottom: 1px solid var(--border-color); }
        .day-header.is-today { background: var(--primary); color: white; }
        .task-list-mini { list-style: none; font-size: 13px; padding: 12px; flex-grow: 1; }
        .task-list-mini li { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--bg-color); gap: 8px; }
        .task-list-mini li.done .task-text { text-decoration: line-through; color: var(--text-muted); }

        /* --- Chat & Embeds (New) --- */
        .chat-btn-float { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; box-shadow: 0 10px 20px var(--glass-shadow); z-index: 200; transition: 0.3s; }
        .chat-btn-float:hover { transform: scale(1.1); }
        
        .chat-window { position: fixed; bottom: 90px; right: 20px; width: 350px; height: 450px; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: none; flex-direction: column; z-index: 200; overflow: hidden; }
        .chat-window.open { display: flex; animation: fadeIn 0.3s; }
        .chat-header { background: var(--primary); color: white; padding: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
        .chat-body { flex-grow: 1; padding: 12px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: var(--bg-color); }
        .chat-input-area { padding: 10px; background: var(--card-bg); border-top: 1px solid var(--border-color); display: flex; gap: 8px; }
        .chat-input { flex-grow: 1; border: 1px solid var(--border-color); padding: 8px; border-radius: 20px; background: var(--bg-color); color: var(--text-main); }

        .msg { padding: 8px 12px; border-radius: 12px; max-width: 85%; font-size: 13px; line-height: 1.4; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg.them { align-self: flex-start; background: var(--card-bg); border: 1px solid var(--border-color); border-bottom-left-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .msg iframe { width: 100%; aspect-ratio: 16/9; border-radius: 8px; border: none; margin-top: 5px; }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            .weekly-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: stretch; gap: 15px; }
            .nav-tabs { justify-content: center; flex-wrap: wrap; }
            .profile-switcher, .controls { justify-content: center; }
            .chat-window { width: 90%; right: 5%; bottom: 85px; }
        }

        /* --- Finances --- */
        .finance-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px; }
        .fin-box { background: var(--bg-color); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
        .fin-box .val { font-size: 24px; font-weight: 800; color: var(--text-main); }
        .val.positive { color: var(--success); } .val.negative { color: var(--danger); }
        @media (max-width: 768px) { .finance-summary { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <!-- SOUND EFFECTS -->
    <audio id="snd-pop" src="https://assets.mixkit.co/active_storage/sfx/2578/2578-preview.mp3"></audio>
    <audio id="snd-msg" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <header>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')"><i class="fas fa-chart-pie"></i> Dashboard</button>
            <button class="tab-btn" onclick="switchTab('tasks')"><i class="fas fa-tasks"></i> Tasks</button>
            <button class="tab-btn" onclick="switchTab('finances')"><i class="fas fa-wallet"></i> Finances</button>
            <button class="tab-btn" onclick="switchTab('analytics')"><i class="fas fa-chart-bar"></i> Analytics</button>
            <button class="tab-btn" onclick="switchTab('goals')"><i class="fas fa-bullseye"></i> Goals</button>
        </div>
        
        <div class="profile-switcher">
            <img src="https://ui-avatars.com/api/?name=TC&background=random" class="pfp-btn active" id="pfp-user1" onclick="switchProfile('user1')" title="the1coolpop (OKC)">
            <img src="https://ui-avatars.com/api/?name=GO&background=random" class="pfp-btn" id="pfp-user2" onclick="switchProfile('user2')" title="goshaaaa (Kharkiv)">
        </div>

        <div class="controls">
            <div class="clock-widget">
                <div class="clock-time" id="clockTime">00:00</div>
                <div class="clock-date" id="clockDate">Loading...</div>
            </div>
            <div class="level-badge">
                <i class="fas fa-star" style="color: var(--xp-color);"></i>
                <span class="level-text" id="levelDisplay">Lvl 1</span>
                <div class="xp-bar-container"><div class="xp-bar-fill" id="xpBar"></div></div>
            </div>
            <button class="icon-btn" onclick="changePFP()" title="Change Profile Picture"><i class="fas fa-camera"></i></button>
            <button class="icon-btn" onclick="toggleDarkMode()"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <div class="container">
        
        <!-- DASHBOARD (V3 Style + Missed Logic) -->
        <div id="dashboard" class="page active">
            <div class="card">
                <div class="card-header">
                    <span><i class="fas fa-calendar-check" style="color: var(--primary);"></i> Daily Routine</span>
                    <span style="font-size: 12px; font-weight: normal; color: var(--text-muted);">Red = Missed</span>
                </div>
                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead><tr><th>Habit</th><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th></th></tr></thead>
                        <tbody id="habitTableBody"></tbody>
                    </table>
                </div>
                <button class="btn-add" onclick="addHabit()">+ Add Habit</button>
            </div>
            <div class="weekly-grid" id="weeklyGrid"></div>
        </div>

        <!-- TASKS -->
        <div id="tasks" class="page">
            <div class="card">
                <div class="card-header"><i class="fas fa-list-ul" style="color: var(--primary);"></i> Master Task List</div>
                <div style="overflow-x:auto;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 40px;"></th>
                                <th>Task Name</th>
                                <th>Category</th>
                                <th>Due</th>
                                <th>Status</th>
                                <th style="width: 40px;"></th>
                            </tr>
                        </thead>
                        <tbody id="taskListBody"></tbody>
                    </table>
                </div>
                <button class="btn-add" onclick="addNewMainTask()">+ Add New Task</button>
            </div>
        </div>

        <!-- FINANCES -->
        <div id="finances" class="page">
            <div class="finance-summary">
                <div class="fin-box"><h3>Start Bal</h3><div class="val editable" contenteditable="true" onblur="updateFinStart(this.innerText)" id="finStart">$0.00</div></div>
                <div class="fin-box"><h3>Income</h3><div class="val positive" id="finIncTotal">$0.00</div></div>
                <div class="fin-box"><h3>Expenses</h3><div class="val negative" id="finExpTotal">$0.00</div></div>
                <div class="fin-box"><h3>Net Bal</h3><div class="val" id="finNetTotal">$0.00</div></div>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <div class="card" style="margin:0;">
                    <div class="card-header" style="color: var(--success);">Income</div>
                    <table class="data-table"><tbody id="incomeTableBody"></tbody></table>
                    <button class="btn-add" onclick="addFinanceRow('income')">+ Add Income</button>
                </div>
                <div class="card" style="margin:0;">
                    <div class="card-header" style="color: var(--danger);">Expenses</div>
                    <table class="data-table"><tbody id="expenseTableBody"></tbody></table>
                    <button class="btn-add" onclick="addFinanceRow('expenses')">+ Add Expense</button>
                </div>
            </div>
        </div>

        <!-- ANALYTICS (New) -->
        <div id="analytics" class="page">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="card">
                    <div class="card-header">Task Status</div>
                    <canvas id="chartStatus"></canvas>
                </div>
                <div class="card">
                    <div class="card-header">Categories</div>
                    <canvas id="chartCat"></canvas>
                </div>
            </div>
        </div>

        <!-- GOALS -->
        <div id="goals" class="page">
            <div class="card">
                <div class="card-header"><i class="fas fa-trophy" style="color: var(--warning);"></i> Long-Term Goals</div>
                <table class="data-table"><tbody id="goalsTableBody"></tbody></table>
                <button class="btn-add" onclick="addGoal()">+ Add Goal</button>
            </div>
        </div>
    </div>

    <!-- CHAT WIDGET -->
    <div class="chat-btn-float" onclick="toggleChat()"><i class="fas fa-comment-dots"></i></div>
    <div class="chat-window" id="chatWindow">
        <div class="chat-header">
            <span>Synced Chat</span>
            <i class="fas fa-times" style="cursor:pointer;" onclick="toggleChat()"></i>
        </div>
        <div class="chat-body" id="chatBody"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chatInput" placeholder="Message or YouTube/Image link..." onkeypress="handleChatKey(event)">
            <button onclick="sendChat()" style="background:transparent; border:none; color:var(--primary); font-size:18px; cursor:pointer;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // FIREBASE KEYS
        const firebaseConfig = {
            apiKey: "AIzaSyCDc6zQJtjM6qjFZtkNpQDI0QbZDzOpDR4",
            authDomain: "coolpopswebsite.firebaseapp.com",
            databaseURL: "https://coolpopswebsite-default-rtdb.firebaseio.com",
            projectId: "coolpopswebsite",
            storageBucket: "coolpopswebsite.firebasestorage.app",
            messagingSenderId: "841625716847",
            appId: "1:841625716847:web:d70b476cce6fd1f5ee659a",
            measurementId: "G-2JTX8J44FW"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // LOGIC
        const USERS = { 'user1': { name: 'the1coolpop', tz: 'America/Chicago' }, 'user2': { name: 'goshaaaa', tz: 'Europe/Kyiv' } };
        let currentProfile = 'user1';
        let currentMonth = new Date().toISOString().slice(0, 7);
        let appData = { habits:[], weekDays:[], taskList:[], finances:{income:[],expenses:[]}, goals:[] };
        let settings = { xp:0, level:1, pfp:'' };
        let isTyping = false;
        let charts = {};

        // Init
        window.onload = function() {
            initCharts();
            listenToData();
            listenToChat();
            updateClock();
            setInterval(updateClock, 1000);
        };

        // Firebase Sync
        function listenToData() {
            db.ref(`profiles/${currentProfile}`).on('value', snap => {
                if(isTyping) return;
                const val = snap.val();
                if(val) {
                    settings = val.settings || settings;
                    if(val.months && val.months[currentMonth]) appData = val.months[currentMonth];
                    else appData = getEmptyMonth();
                }
                renderAll();
            });
        }
        function saveData() { 
            db.ref(`profiles/${currentProfile}/settings`).set(settings);
            db.ref(`profiles/${currentProfile}/months/${currentMonth}`).set(appData);
        }
        function getEmptyMonth() {
            return {
                habits: [{name:"New Habit", days:Array(7).fill(false)}],
                weekDays: Array(7).fill().map((_,i) => ({name: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][i], tasks:[]})),
                taskList: [], finances: { income:[], expenses:[], startingAmount:0 }, goals:[]
            };
        }

        function switchProfile(pid) {
            currentProfile = pid;
            document.querySelectorAll('.pfp-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`pfp-${pid}`).classList.add('active');
            updateClock();
            db.ref().off(); // Stop all listeners
            listenToData();
            listenToChat(); // Restart chat listener
        }

        // Render Functions
        function renderAll() {
            updateXP();
            if(settings.pfp) document.getElementById(`pfp-${currentProfile}`).src = settings.pfp;
            renderHabits();
            renderWeekly();
            renderTasks();
            renderFinances();
            renderGoals();
            updateCharts();
        }

        function renderHabits() {
            const dayIdx = new Date().getDay();
            const html = (appData.habits||[]).map((h, i) => `
                <tr>
                    <td><span class="editable" contenteditable="true" onfocus="isTyping=true" onblur="appData.habits[${i}].name=this.innerText; isTyping=false; saveData()">${h.name}</span></td>
                    ${(h.days||[]).map((d, dI) => {
                        let missed = (!d && dI < dayIdx);
                        return `<td><input type="checkbox" class="${missed?'missed':''}" ${d?'checked':''} onchange="toggleHabit(${i},${dI})"></td>`;
                    }).join('')}
                    <td><i class="fas fa-trash" style="cursor:pointer; color:var(--text-muted);" onclick="appData.habits.splice(${i},1); saveData()"></i></td>
                </tr>
            `).join('');
            document.getElementById('habitTableBody').innerHTML = html;
        }

        function renderWeekly() {
            const dayIdx = new Date().getDay();
            const html = (appData.weekDays||[]).map((d, i) => `
                <div class="day-card">
                    <div class="day-header ${i===dayIdx?'is-today':''}">${d.name}</div>
                    <ul class="task-list-mini">
                        ${(d.tasks||[]).map((t, tI) => `
                            <li class="${t.done?'done':''}">
                                <input type="checkbox" ${t.done?'checked':''} onchange="toggleDayTask(${i},${tI})">
                                <span class="task-text editable" contenteditable="true" onfocus="isTyping=true" onblur="appData.weekDays[${i}].tasks[${tI}].name=this.innerText; isTyping=false; saveData()">${t.name}</span>
                                <i class="fas fa-times" onclick="appData.weekDays[${i}].tasks.splice(${tI},1); saveData()"></i>
                            </li>
                        `).join('')}
                    </ul>
                    <button class="btn-add" style="margin:5px; width:calc(100% - 10px); padding:5px;" onclick="addDayTask(${i})">+ Add</button>
                </div>
            `).join('');
            document.getElementById('weeklyGrid').innerHTML = html;
        }

        function renderTasks() {
            const html = (appData.taskList||[]).map((t, i) => `
                <tr style="${t.done?'opacity:0.5':''}">
                    <td><input type="checkbox" ${t.done?'checked':''} onchange="toggleMainTask(${i})"></td>
                    <td><span class="editable" contenteditable="true" onfocus="isTyping=true" onblur="appData.taskList[${i}].name=this.innerText; isTyping=false; saveData()">${t.name}</span></td>
                    <td>
                        <select style="border:none; bg:transparent;" onchange="appData.taskList[${i}].cat=this.value; saveData()">
                            <option value="Work" ${t.cat==='Work'?'selected':''}>💼 Work</option>
                            <option value="Personal" ${t.cat==='Personal'?'selected':''}>🏠 Personal</option>
                        </select>
                    </td>
                    <td><input type="date" value="${t.due||''}" onchange="appData.taskList[${i}].due=this.value; saveData()"></td>
                    <td><span style="font-size:12px; font-weight:bold; color:var(--${t.done?'success':'warning'})">${t.done?'DONE':'TODO'}</span></td>
                    <td><i class="fas fa-trash" style="cursor:pointer;" onclick="appData.taskList.splice(${i},1); saveData()"></i></td>
                </tr>
            `).join('');
            document.getElementById('taskListBody').innerHTML = html;
        }

        function renderFinances() {
            const f = appData.finances || {income:[], expenses:[], startingAmount:0};
            document.getElementById('finStart').innerText = f.startingAmount;
            
            const renderRow = (type) => (f[type]||[]).map((item, i) => `
                <tr>
                    <td><span class="editable" contenteditable="true" onfocus="isTyping=true" onblur="appData.finances.${type}[${i}].name=this.innerText; isTyping=false; saveData()">${item.name}</span></td>
                    <td><span class="editable" contenteditable="true" onfocus="isTyping=true" onblur="appData.finances.${type}[${i}].amt=parseFloat(this.innerText); isTyping=false; saveData()">${item.amt}</span></td>
                    <td><i class="fas fa-trash" onclick="appData.finances.${type}.splice(${i},1); saveData()"></i></td>
                </tr>
            `).join('');

            document.getElementById('incomeTableBody').innerHTML = renderRow('income');
            document.getElementById('expenseTableBody').innerHTML = renderRow('expenses');

            const inc = (f.income||[]).reduce((a,b)=>a+(b.amt||0),0);
            const exp = (f.expenses||[]).reduce((a,b)=>a+(b.amt||0),0);
            const net = (parseFloat(f.startingAmount)||0) + inc - exp;
            
            document.getElementById('finIncTotal').innerText = `$${inc}`;
            document.getElementById('finExpTotal').innerText = `$${exp}`;
            document.getElementById('finNetTotal').innerText = `$${net}`;
        }

        function renderGoals() {
            document.getElementById('goalsTableBody').innerHTML = (appData.goals||[]).map((g,i) => `
                <tr style="${g.done?'opacity:0.5':''}">
                    <td><input type="checkbox" ${g.done?'checked':''} onchange="appData.goals[${i}].done=!appData.goals[${i}].done; if(appData.goals[${i}].done) gainXP(50); saveData()"></td>
                    <td><span class="editable" contenteditable="true" onblur="appData.goals[${i}].text=this.innerText; saveData()">${g.text}</span></td>
                    <td><i class="fas fa-trash" onclick="appData.goals.splice(${i},1); saveData()"></i></td>
                </tr>
            `).join('');
        }

        // Actions
        function playPop() { document.getElementById('snd-pop').play().catch(()=>{}); }
        function toggleHabit(h,d) { appData.habits[h].days[d] = !appData.habits[h].days[d]; if(appData.habits[h].days[d]) gainXP(5); saveData(); playPop(); }
        function addHabit() { appData.habits.push({name:'Habit', days:Array(7).fill(false)}); saveData(); }
        function toggleDayTask(d,t) { appData.weekDays[d].tasks[t].done = !appData.weekDays[d].tasks[t].done; if(appData.weekDays[d].tasks[t].done) gainXP(10); saveData(); playPop(); }
        function addDayTask(d) { appData.weekDays[d].tasks.push({name:'Task', done:false}); saveData(); }
        function toggleMainTask(i) { appData.taskList[i].done = !appData.taskList[i].done; if(appData.taskList[i].done) gainXP(20); saveData(); playPop(); }
        function addNewMainTask() { if(!appData.taskList) appData.taskList=[]; appData.taskList.push({name:'New Task', cat:'Personal', done:false}); saveData(); }
        function addFinanceRow(type) { if(!appData.finances[type]) appData.finances[type]=[]; appData.finances[type].push({name:'Item', amt:0}); saveData(); }
        function updateFinStart(val) { appData.finances.startingAmount = parseFloat(val)||0; saveData(); }
        function addGoal() { if(!appData.goals) appData.goals=[]; appData.goals.push({text:'Goal', done:false}); saveData(); }

        function gainXP(amt) { settings.xp+=amt; if(settings.xp>=settings.level*100) { settings.xp=0; settings.level++; alert("Level Up!"); } saveData(); }
        function updateXP() { document.getElementById('levelDisplay').innerText = `Lvl ${settings.level}`; document.getElementById('xpBar').style.width = `${(settings.xp/(settings.level*100))*100}%`; }
        function changePFP() { const url = prompt("Image URL for PFP:"); if(url) { settings.pfp=url; saveData(); } }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

        // Chat
        function toggleChat() { document.getElementById('chatWindow').classList.toggle('open'); }
        function listenToChat() {
            db.ref('chat').limitToLast(50).on('child_added', snap => {
                const msg = snap.val();
                renderMsg(msg);
                document.getElementById('snd-msg').play().catch(()=>{});
            });
        }
        function sendChat() {
            const txt = document.getElementById('chatInput').value;
            if(!txt) return;
            db.ref('chat').push({ sender: currentProfile, text: txt, time: Date.now() });
            document.getElementById('chatInput').value = '';
        }
        function handleChatKey(e) { if(e.key === 'Enter') sendChat(); }
        function renderMsg(msg) {
            const div = document.createElement('div');
            const isMe = msg.sender === currentProfile;
            div.className = `msg ${isMe ? 'me' : 'them'}`;
            let content = msg.text;
            
            // YouTube / Image Regex
            const ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|\S*?[?&]v=)|youtu\.be\/)([a-zA-Z0-9_-]{11})/;
            const imgRegex = /(https?:\/\/.*\.(?:png|jpg|jpeg|gif))/i;
            const ytMatch = content.match(ytRegex);
            const imgMatch = content.match(imgRegex);

            if (ytMatch) content = content.replace(ytMatch[0], `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}" allowfullscreen></iframe>`);
            else if (imgMatch) content = content.replace(imgMatch[0], `<img src="${imgMatch[0]}">`);

            div.innerHTML = `<strong>${USERS[msg.sender].name}</strong><br>${content}`;
            document.getElementById('chatBody').appendChild(div);
            document.getElementById('chatBody').scrollTop = document.getElementById('chatBody').scrollHeight;
        }

        // Charts
        function initCharts() {
            const ctx1 = document.getElementById('chartStatus').getContext('2d');
            charts.status = new Chart(ctx1, { type: 'pie', data: { labels: ['Done', 'Todo'], datasets: [{ data: [0,1], backgroundColor: ['#22c55e', '#e2e8f0'] }] } });
            const ctx2 = document.getElementById('chartCat').getContext('2d');
            charts.cat = new Chart(ctx2, { type: 'doughnut', data: { labels: ['Work', 'Personal'], datasets: [{ data: [1,1], backgroundColor: ['#6366f1', '#f59e0b'] }] } });
        }
        function updateCharts() {
            const done = (appData.taskList||[]).filter(t=>t.done).length;
            charts.status.data.datasets[0].data = [done, (appData.taskList||[]).length - done];
            charts.status.update();
        }

        // Utils
        function updateClock() {
            const tz = USERS[currentProfile].tz;
            const now = new Date();
            document.getElementById('clockTime').innerText = now.toLocaleTimeString('en-US', {timeZone:tz, hour:'2-digit', minute:'2-digit'});
            document.getElementById('clockDate').innerText = now.toLocaleDateString('en-US', {timeZone:tz, weekday:'short', month:'short', day:'numeric'});
        }
        function switchTab(id) {
            document.querySelectorAll('.page').forEach(el=>el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
